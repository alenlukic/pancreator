id: tesseract.features.timestamp_naming.migration_precedence
kind: tests
severity: block
applies_to:
  kind: file-path
  glob: "tools/migrate-timestamp-naming.mjs"
owner: coder
description: |
  When the migration derives a timestamp for an in-scope artifact, the migration SHALL select the git oldest-add timestamp before `created_at` frontmatter before filesystem `mtime` before an operator override, matching the ratified precedence order.
