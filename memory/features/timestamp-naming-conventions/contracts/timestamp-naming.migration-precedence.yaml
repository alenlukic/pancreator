    path: memory/features/timestamp-naming-conventions/spec.md
    range: [123, 129]
    contentHash: TBD-on-commit
    note: "Deferral note closed in plan; precedence encoded in migration tooling."
  - kind: lines
    path: tools/migrate-timestamp-naming.mjs
    range: [163, 193]
    contentHash: TBD-on-commit
    note: "chooseTimestamp implements the ratified precedence (git, frontmatter, mtime, override)."
runtime:
  entry: "tools/migrate-timestamp-naming.mjs"
  exported_symbol: "chooseTimestamp"
metadata:
  tesseract.contract_id: tesseract.features.timestamp_naming.migration_precedence
