id: tesseract.features.timestamp_naming.policy_descriptor
kind: tests
severity: block
applies_to:
  kind: file-path
  glob: "internal/tests/compliance/timestamp-naming-conventions.yaml"
owner: coder
description: |
  When the compliance runner evaluates timestamp naming policy, the runner SHALL emit a block failure unless `internal/tests/compliance/timestamp-naming-conventions.yaml` validates against `internal/tests/compliance/schemas/latest.yaml` and lists `structure-change` plus `operator-on-demand` trigger modes.
references:
  - kind: lines
    path: memory/features/timestamp-naming-conventions/spec.md
    range: [54, 103]
    contentHash: TBD-on-commit
    note: "UTC, FDS, SID, work directory, inbox basename, and collision acceptance criteria."
  - kind: lines
    path: internal/tests/compliance/schemas/latest.yaml
    range: [1, 63]
    contentHash: TBD-on-commit
    note: "Descriptor schema envelope."
runtime:
  compliance_descriptor: "internal/tests/compliance/timestamp-naming-conventions.yaml"
  schema_ref: "internal/tests/compliance/schemas/latest.yaml"
metadata:
  tesseract.contract_id: tesseract.features.timestamp_naming.policy_descriptor
  tesseract.applies_to: "file-path:internal/tests/compliance/timestamp-naming-conventions.yaml"
  tesseract-bootstrap-only: false
