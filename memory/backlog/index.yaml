    evidence: "Post-write dry-run captured 17 residual inbox renames and 322 reference-row edits that would re-prefix already-prefixed stems (for example 27250_1625_x.md restamped to 27250_1625_27250_1625_x.md). Migration write is therefore non-idempotent in its current shape."
    notes: "Strip a ratified SID/HHMM prefix before treating the residual basename as the semantic stem inside migrateTargetForInboxPath. Required before any future migration --write run."

