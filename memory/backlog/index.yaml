      - /memory/adr/0005-timestamp-naming-conventions.md
    evidence: "Phase 4 migration write at commit 2a41ca9 failed mid-flight with ENOENT inside applyReferenceUpdatesFromManifest because renames had already moved files off the manifest's pre-rename paths. Coder recovered by manually applying 670 reference edits through a one-off post-rename resolver."
