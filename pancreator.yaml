# Live workspace policy.
# `project_root: "."` — harness and target project share the same repository root.
project_root: "."

risk_tier: medium
threshold_policy: defaults.medium  # from pancreator-defaults.yaml

# Design steps for feature-delivery. Planning always delegates product work to
# product-engineer; when true, plan also delegates design-engineer before tech-lead
# consolidation. The tech-lead emits product/design/tech implementation plans,
# product/design/tech acceptance criteria, and manual QA test cases. Test runs
# qa-tester and design-reviewer in parallel; qa-tester exercises manual QA cases,
# while design-reviewer checks global UI/UX/design rules via Chrome DevTools MCP.
# Per-feature spec.md frontmatter `design_steps: false` overrides this default for
# backend-only features that ship no operator-facing UI.
feature_delivery:
  design_steps: true

# Feature-delivery runner invocation (opt-in). Omit this block or set `manual` to keep
# the handoff-and-paste operator loop. Set `sdk` to invoke CursorRunner on run/advance.
runner:
  cursor:
    invocation: sdk
    # When true (default under sdk), incomplete stage artifacts trigger
    # pancreator-engineer remediation before the stage is treated as complete.
    stage_remediation: true
    sdkSampling:
      enabled: true
      ratePercent: 10
      scope: feature-delivery
contract_bundle:
  kind: rego
  telemetry_gates: [coverage-floor, bundle-size-delta, feature-contracts-pull]

commands:
  # Local project hooks used by future policy/pipeline runners.
  test: "npm test"
  build: "npm run build"
  lint: "npm run lint"

# Minimal override shape: keep empty unless a local experiment needs an explicit override.
overrides:
  gates: {}
  gates_on_failure: {}
  commands:
    hooks: {}
