# Model escalation — config "default"
#
# Tier resolution (stageInvocationIndex N): greatest numeric tier key <= N; else `default`.
#
# Ladder rules (Cursor API pricing + LiveBench capability):
#   - default: auto (index 0; Auto + Composer pool)
#   - 1: persona baseline from lib/personas/<slug>.md
#   - Higher tiers MUST NOT downgrade to a weaker, pricier model, nor upgrade to a
#     stronger, cheaper model (that model belongs in tier 1 or persona frontmatter).
#   - When no valid model step exists, escalate via bracket qualifiers on the same
#     family (effort=, reasoning=) per https://cursor.com/docs/models-and-pricing
#   - Sparse tier keys are intentional: loopbacks may reuse the prior tier.
#   - Design-critical and synthesis personas (sme-product, sme-design,
#     product-design-lead, product-engineer, design-engineer, design-reviewer) MUST NOT resolve to
#     `auto` or to a Composer-pool model in any config; every tier for these
#     personas pins an explicit high-reasoning model.
#
# Pricing reference: https://cursor.com/docs/models-and-pricing (API output $/1M
# as primary cost axis). Capability tie-break: LiveBench-2026-01-08.

