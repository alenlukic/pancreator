schema_ref: "tests/compliance/schemas/latest.yaml"
id: "feature-index-artifact-index"
severity: "medium"
trigger_modes:
  - structure-change
  - operator-on-demand
scope:
  surface: "feature-memory-index"
  artifacts:
    - "lib/memory/features/**/index.json"
    - "lib/personas/librarian.md"
    - "lib/pipelines/feature-delivery.yaml"
    - "lib/memory/features/README.md"
    - "tests/feature-index-artifact-index.test.mjs"
assertion:
  statement: >
    Shipped feature indexes SHALL declare an artifact_index object with repo-relative
    pointers to acceptance-criteria sources, gate evidence, audit logs, and compliance
    artifacts for the originating feature-delivery run. Indexes MUST NOT inline full
    artifact bodies; they MUST only link to .pan/archive/work paths or other durable
    audit surfaces such as compliance-tests/audit-history.json.
  pass_criteria: >
    `node --test tests/feature-index-artifact-index.test.mjs` exits zero. Any
    lib/memory/features/<category>/<id>/index.json that includes artifact_index MUST
    expose the required flat path keys declared in that test with non-empty string
    values.
