schema_ref: "tests/compliance/schemas/latest.yaml"
id: "json-formatting"
severity: "high"
trigger_modes:
  - operator-on-demand
  - structure-change
scope:
  surface: "json-formatting-policy-migration-and-hashes"
  artifacts:
    - "tests/compliance/json-formatting.yaml"
    - "lib/memory/features/quality-governance/json-formatting/index.json"
    - "lib/internal/tools/format/canonical-json-format.mjs"
    - "lib/internal/tools/migrations/migrate-json-formatting.mjs"
    - "tests/migrate-json-formatting.test.mjs"
    - "tests/fixtures/json-formatting/agent-chat-payload-expectation.json"
    - "tests/fixtures/json-formatting/forbidden-inline-citation-snippet.raw"
    - "lib/memory/handbook/glossary.md"
assertion:
  statement: >
    Every in-scope repository JSON artifact SHALL serialize with indent 2, one object
    key-value pair per line, abbreviated git hash and abbreviated contentHash prefixes whose
    length equals the live `git rev-parse --short HEAD` length at write time, default array layout
    (no strict requirement that each primitive array element occupies its own line), and exclusions
    for paths under node_modules/, common vendored subtrees (`vendor/`, `third_party/`),
    tooling-regenerated `package-lock.json` and `tsconfig.tsbuildinfo` files. Automated tests SHALL
    also exercise Markdown-embedded JSON, terminal CLI JSON payloads, and agent-chat JSON sketches
    for compact multi-key dual-anchor blobs and whitespace layout where practical fixtures exist.
    JavaScript object-literal substitutes for JSON on those surfaces MUST fail repository checks when
    they appear in enumerated fixture paths.
  pass_criteria: >
    Automated checks under tests/ exercising migrate-json-formatting and canonical-json-format
    rules report zero actionable formatting violations after an operator-approved bulk migration
    (`--write` with `PANCREATOR_MIGRATION_GO=1`) for tracked `.json` files; supplementary fixture
    checks SHALL flag Markdown/terminal/agent-chat regressions enumerated in migrate-json-formatting
    tests; descriptors validate against tests/compliance/schemas/latest.yaml.
