schema_ref: "tests/compliance/schemas/latest.yaml"
id: "governance-enforcement"
severity: "high"
trigger_modes:
  - operator-on-demand
  - structure-change
scope:
  surface: "agent-governance-framework"
  artifacts:
    - "lib/memory/handbook/agent-document-registry.md"
    - "lib/personas"
    - "lib/pipelines/feature-delivery.yaml"
    - "pancreator-model-escalation.yaml"
    - "lib/memory/handbook/output-manifest-contract.md"
    - ".cursor/agents"
    - ".cursor/rules"
    - "tests/agent-document-registry-integrity.test.mjs"
    - "tests/model-escalation-completeness.test.mjs"
    - "lib/internal/tools/checks/check-cursor-projection-drift.mjs"
    - "lib/internal/tools/checks/check-persona-required-context-rfc2119.mjs"
    - "lib/internal/tools/governance/audit-governance-usage.mjs"
assertion:
  statement: >
    The static-contract governance framework SHALL remain internally consistent
    and enforced by deterministic, fail-closed checks rather than by persona
    prose alone. Specifically: every DOC.*/PIPE.*/PERSONA.* key in
    DOC.REGISTRY resolves on disk; every persona owns a complete
    '## Static execution contract' whose required bullets use RFC 2119
    keywords; every persona defines RTK-first shell retrieval discipline in
    responsibilities and exposes `Bash(rtk:*)` in tools; every
    feature-delivery persona (including design/product sub-stage personas)
    resolves in every model-escalation config; the gitignored Cursor
    projections stay in sync with their canonical persona specs.
  pass_criteria: >
    All of the following exit zero:
    `node --test tests/agent-document-registry-integrity.test.mjs`,
    `node --test tests/model-escalation-completeness.test.mjs`,
    `node lib/internal/tools/checks/check-persona-required-context-rfc2119.mjs`,
    `node lib/internal/tools/checks/check-cursor-projection-drift.mjs`, and
    `node lib/internal/tools/governance/audit-governance-usage.mjs` produces the
    governance usage + friction report used to review residual warn-level
    signals (escalation WARN noise and re-entry load).
