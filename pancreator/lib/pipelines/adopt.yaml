# Operator section
- 👀 **In this file:** Pipeline definition `adopt`.
- ⚖️ **Why it matters:** Quick orientation for adopt before agents load the full contract.
- 🧭 **See also:**
  - pancreator/lib/pipelines/README.md
  - pancreator/lib/memory/handbook/pipeline-state-contract.md
id: adopt
version: "1"
metadata:
  pancreator-bootstrap-only: false
  description: >-
    PRD §11 MVP pipeline. Non-destructive adoption of an existing repo.
    `adopter` scans languages, frameworks, test infrastructure, CI, and
    conventions, then emits a paired inbox directive that the human ratifies
    before any structural change.
  references:
    - kind: lines
      path: .docs/PRD.md
      range: [1, 80]
      contentHash: 2eb6aa4
      note: Cited for product context; pipeline structure derives from PRD §11.
stages:
  - id: scan
    persona: adopter
    label: Scan the repository surface and emit a scan report
  - id: ratify
    label: Pause for human ratification of the scan report
