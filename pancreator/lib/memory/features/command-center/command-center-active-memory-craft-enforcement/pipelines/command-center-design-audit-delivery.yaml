id: command-center-design-audit-delivery
version: "1"
supervisor: supervisor
metadata:
  pancreator-bootstrap-only: false
  description: >-
    Feature-scoped design hardening loop for the Command Center (client/).
    The design-reviewer audits the running Command Center UX, style, and layout via the
    chrome-devtools MCP server against the measurable craft standards and
    gate-blocking conditions in lib/memory/handbook/engineering/design-craft.md;
    the intake-analyst canonicalizes the audit findings into one lib/inbox/in/
    directive with design_steps enabled; the supervisor then runs feature-delivery
    on that directive in fully automated SDK mode so design-engineer and
    design-reviewer run as plan and test companions. For enforcement-only
    validation without mutating client/, use
    lib/memory/features/command-center/command-center-active-memory-craft-enforcement/pipelines/command-center-design-audit-validation.yaml
    (audit + intake only). Optional arguments bind to the audit stage so the
    operator can target a specific Command Center surface and dev-server URL.
  args:
    - id: base-url
      label: Command Center dev-server base URL the design-reviewer audits
      default: http://localhost:3000
    - id: route
      label: Command Center route path to audit first
      default: /
    - id: deliver
      label: When false, supervisor SHALL skip the deliver stage (prefer command-center-design-audit-validation.yaml)
      default: "true"
  references:
    - kind: lines
      path: .docs/PRD.md
      range: [1, 80]
      contentHash: 2eb6aa4
      note: Cited for product context; pipeline structure derives from PRD §11.
    - kind: lines
      path: .docs/PRD.md
      range: [134, 142]
      contentHash: 2eb6aa4
      note: >-
        PRD §3.5 US-3 — UX spec contracts gate downstream verification; the
        design-reviewer inspects the running DOM against design assertions.
stages:
  - id: audit
    persona: design-reviewer
    label: Audit the running Command Center UX, style, and layout via the chrome-devtools MCP server against the design-craft gate-blocking conditions
    inputs:
      - client/
      - lib/memory/handbook/engineering/design-craft.md
      - "arg:base-url"
      - "arg:route"
    outputs:
      - .pan/work/<day>/<task-id>/command-center-design-audit.md
  - id: intake
    persona: intake-analyst
    label: Canonicalize the design-audit findings into one lib/inbox/in/ directive with design_steps enabled in the drafted spec frontmatter
    inputs:
      - .pan/work/<day>/<task-id>/command-center-design-audit.md
    outputs:
      - lib/inbox/in/<day-bucket>/<SID>_<HHMM>_<slug>.md
  - id: deliver
    persona: supervisor
    label: Run feature-delivery on the drafted directive in fully automated SDK mode with design steps on so design-engineer and design-reviewer gate the run
    gate: "arg:deliver != false"
    inputs:
      - lib/inbox/in/<day-bucket>/<SID>_<HHMM>_<slug>.md
