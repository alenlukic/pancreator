persona: librarian
description: When the `feature-delivery` pipeline finishes its `report` stage, or when the `knowledge-curation` cron pipeline fires, the `librarian` SHALL index every emitted Artifact, refresh the Feature index at `/lib/memory/features/<category>/<id>/index.json`, and flag stale citations across the Memory tier.
globs:
  - lib/memory/features/**/index.json
  - lib/memory/backlog/index.yaml
  - lib/memory/curation/sweep-*.md
alwaysApply: false
