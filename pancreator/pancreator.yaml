# Live workspace policy with bundled threshold defaults.
# `project_root: "pancreator"` — self-host runtime lives under pancreator/.
project_root: "pancreator"

risk_tier: medium
threshold_policy: defaults.medium  # selects the nested defaults bundle below

defaults:
  low:
    risk_tier: low
    gates:
      coverage:
        statement: { op: ">=", value: 70, severity: deny }
        branch: { op: ">=", value: 60, severity: warn }
        new_lines_only: true
      bundle:
        size_delta_max: { op: "<=", value: "+5%", severity: warn }
      regression:
        suites: []
        flake_tolerance: { op: "==", value: 0, severity: warn }
      contracts: from_feature
      contract_bundle:
        kind: rego
        telemetry_gates: [coverage-floor, bundle-size-delta, feature-contracts-pull]
    gates_on_failure:
      default: route_back_to_implement
    commands:
      hooks:
        test: null
        build: null
        lint: null

  medium:
    risk_tier: medium
    gates:
      coverage:
        statement: { op: ">=", value: 80, severity: deny }
        branch: { op: ">=", value: 70, severity: deny }
        new_lines_only: true
      bundle:
        size_delta_max: { op: "<=", value: "+3%", severity: deny }
      regression:
        suites: []
        flake_tolerance: { op: "==", value: 0, severity: warn }
      contracts: from_feature
      contract_bundle:
        kind: rego
        telemetry_gates: [coverage-floor, bundle-size-delta, feature-contracts-pull]
    gates_on_failure:
      default: route_back_to_implement
      coverage: route_back_to_implement_with_uncovered_diff
    commands:
      hooks:
        test: null
        build: null
        lint: null

  high:
    risk_tier: high
    gates:
      coverage:
        statement: { op: ">=", value: 90, severity: deny }
        branch: { op: ">=", value: 80, severity: deny }
        new_lines_only: true
      bundle:
        size_delta_max: { op: "<=", value: "+2%", severity: deny }
      regression:
        suites: []
        flake_tolerance: { op: "==", value: 0, severity: warn }
      security:
        new_cves_max: { op: "==", value: 0, severity: warn }
      contracts: from_feature
      contract_bundle:
        kind: rego
        telemetry_gates: [coverage-floor, bundle-size-delta, feature-contracts-pull]
    gates_on_failure:
      default: route_back_to_implement
      security: route_to_appsec_review
    commands:
      hooks:
        test: null
        build: null
        lint: null

# Design steps for feature-delivery. Planning always delegates product work to
# product-engineer; when true, plan also delegates design-engineer before tech-lead
# consolidation. The tech-lead emits product/design/tech implementation plans,
# product/design/tech acceptance criteria, and manual QA test cases. Test runs
# qa-tester and design-reviewer in parallel; qa-tester exercises manual QA cases,
# while design-reviewer checks global UI/UX/design rules via Chrome DevTools MCP.
# Per-feature spec.md frontmatter `design_steps: false` overrides this default for
# backend-only features that ship no operator-facing UI.
feature_delivery:
  design_steps: true

# Feature-delivery runner invocation (opt-in). Omit this block or set `manual` to keep
# the handoff-and-paste operator loop. Set `sdk` to invoke CursorRunner on run/advance.
runner:
  cursor:
    invocation: sdk
    # When true (default under sdk), incomplete stage artifacts trigger
    # pancreator-engineer remediation before the stage is treated as complete.
    stage_remediation: true
    sdkSampling:
      enabled: true
      ratePercent: 10
      scope: feature-delivery
contract_bundle:
  kind: rego
  telemetry_gates: [coverage-floor, bundle-size-delta, feature-contracts-pull]

commands:
  # Local project hooks used by future policy/pipeline runners.
  test: "npm test"
  build: "npm run build"
  lint: "npm run lint"

# Minimal override shape: keep empty unless a local experiment needs an explicit override.
overrides:
  gates: {}
  gates_on_failure: {}
  commands:
    hooks: {}
