id: adopt
version: "1"
metadata:
  tesseract-bootstrap-only: false
  description: >-
    PRD §11 MVP pipeline. Non-destructive adoption of an existing repo.
    `adopter` scans languages, frameworks, test infrastructure, CI, and
    conventions, then emits a paired inbox directive that the human ratifies
    before any structural change.
  references:
    - kind: lines
      path: docs/PRD.md
      range: [1, 80]
      contentHash: 2ce8e5cbeed520c3e1d54dd8d27fc07a97caa0cfe23ff452082e54048ad1b7f5
      note: Cited for product context; pipeline structure derives from PRD §11.
stages:
  - id: scan
    persona: adopter
    label: Scan the repository surface and emit a scan report
  - id: ratify
    label: Pause for human ratification of the scan report
