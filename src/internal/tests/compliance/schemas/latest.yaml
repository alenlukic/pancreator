$id: "src/internal/tests/compliance/schemas/latest.yaml"
$schema: "https://json-schema.org/draft/2020-12/schema"
title: "Compliance Test Descriptor Schema latest (v1)"
description: "Latest compatibility alias for compliance test descriptors."
type: object
additionalProperties: false
required:
  - schema_ref
  - id
  - severity
  - trigger_modes
  - scope
  - assertion
properties:
  schema_ref:
    type: string
    const: "src/internal/tests/compliance/schemas/latest.yaml"
  id:
    type: string
    pattern: "^[a-z0-9][a-z0-9-]{2,63}$"
  severity:
    type: string
    enum:
      - high
      - medium
      - low
  trigger_modes:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      type: string
      enum:
        - scheduled-cadence
        - structure-change
        - operator-on-demand
  scope:
    type: object
    additionalProperties: false
    required:
      - surface
      - artifacts
    properties:
      surface:
        type: string
      artifacts:
        type: array
        minItems: 1
        items:
          type: string
  assertion:
    type: object
    additionalProperties: false
    required:
      - statement
      - pass_criteria
    properties:
      statement:
        type: string
        minLength: 1
      pass_criteria:
        type: string
        minLength: 1
