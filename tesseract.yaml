# Bootstrap repo policy and live tracking state.
# `project_root: "."` is the self-hosting value: this harness is embedded in
# the same repository it is currently developing.
project_root: "."

bootstrap:
  phase: "4"
  status: phase-4-ratified
  completed_phases: ["-1", "0", "1", "2", "3"]
  placeholder: false
  enforced_today: false
  current_focus: "US-1 dogfood proof bundle ratified 2026-05-19; nested runs 77373 and 71096 are closed; Phoenix trace verification remains deferred to the @tesseract/run-logger / tesseract-engineer backlog while M1 hardening continues."
  note: "Bootstrap Phase 4 is ratified after the US-1 dogfood proof bundle close-out on 2026-05-19. Nested runs 77373_0230_phase-4-dogfood-proof-bundle-evidence-index and 71096_0415_phase-4-intervention-probe-pause-resume-abort are closed, while Phoenix trace verification remains a deferred engineering item for @tesseract/run-logger and the tesseract-engineer backlog."
  evidence:
    - docs/BOOTSTRAP.md Phase 4 defines the current dogfood verification gate.
    - src/internal/packages/@tesseract/** contains the Phase 3 substrate package implementations.
    - src/pipelines/*.yaml contains the five MVP pipeline definitions named by Phase 4.
    - src/memory/features/us-1-dogfood-phase-4-exit/phase-4-ratification-request.md records the 2026-05-19 human ratification decision for the US-1 Phase 4 dogfood exit.
    - src/memory/features/us-1-dogfood-phase-4-exit/phase-4-proof-bundle.md records the closed nested-run evidence bundle and the remaining Phoenix engineering deferral.

risk_tier: medium
threshold_policy: defaults.medium  # from tesseract-defaults.yaml
contract_bundle:
  kind: rego
  telemetry_gates: [coverage-floor, bundle-size-delta, feature-contracts-pull]

commands:
  # Local project hooks used by future policy/pipeline runners.
  test: "npm test"
  build: "npm run build"
  lint: "npm run lint"

# Minimal override shape for bootstrap:
# keep empty unless a local bootstrap experiment needs an explicit override.
overrides:
  gates: {}
  gates_on_failure: {}
  commands:
    hooks: {}
