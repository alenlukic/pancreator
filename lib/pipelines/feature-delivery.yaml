id: feature-delivery
version: "1"
metadata:
  pancreator-bootstrap-only: false
  description: >-
    PRD §11 MVP pipeline. Walks a semi-formal directive in lib/inbox/in/ through
    canonicalization, planning, implementation, review, delivery report, and
    ship. Mirrors PRD §3.5 US-1. Each stage is owned by a named persona; the
    supervisor enforces gates and dispatches Intervention actions. Runtime
    invocation and advancement regenerate a bounded next-prompt.md so stage
    delegation does not rely on prior chat context. The complete-stage prompt is
    a bounded librarian handoff for agent-executed artifact closure with
    pan close-artifacts after the operator reviews pipeline-close.md.
  references:
    - kind: lines
      path: .docs/PRD.md
      range: [1, 80]
      contentHash: 2eb6aa4
      note: Cited for product context; pipeline structure derives from PRD §11.
    - kind: lines
      path: .docs/BOOTSTRAP.md
      range: [223, 243]
      contentHash: b788753
      note: BOOTSTRAP Phase 4 names this pipeline as the US-1 dogfood entry point.
stages:
  - id: intake
    persona: intake-analyst
    label: Canonicalize the human directive
  - id: plan
    persona: tech-lead
    label: Draft quantified plan, ADR, touch-set with shared-layer annex, and handoff card
    outputs:
      - lib/memory/features/<feature-id>/ux-spec.md
      - .pan/work/<day>/<task-id>/plan.md
      - .pan/work/<day>/<task-id>/adr-draft.md
      - .pan/work/<day>/<task-id>/touch-set.json
      - .pan/work/<day>/<task-id>/handoff.md
      - .pan/work/<day>/<task-id>/next-prompt.md
      - .pan/work/<day>/<task-id>/design-plan-prompt.md
  - id: implement
    persona: coder
    label: Implement touch-set work and emit implementation-report gate proof
    outputs:
      - .pan/work/<day>/<task-id>/implementation-report.md
    inputs:
      - .pan/work/<day>/<task-id>/next-prompt.md
      - .pan/work/<day>/<task-id>/handoff.md
      - .pan/work/<day>/<task-id>/touch-set.json
  - id: review
    persona: reviewer
    label: Run modern-code-review, repo-wide tests, and contracts pass before QA
    outputs:
      - .pan/work/<day>/<task-id>/review.md
  - id: test
    persona: qa-tester
    label: Run automated checks and manual verification; emit test-report.md
    inputs:
      - .pan/work/<day>/<task-id>/review.md
      - .pan/work/<day>/<task-id>/touch-set.json
      - lib/memory/features/<feature-id>/ux-spec.md
    outputs:
      - .pan/work/<day>/<task-id>/test-report.md
      - .pan/work/<day>/<task-id>/design-qa-report.md
      - .pan/work/<day>/<task-id>/design-qa-prompt.md
  - id: report
    persona: tech-writer
    label: Author the delivery report
  - id: compliance
    persona: compliance-auditor
    label: Audit baseline-delta compliance (saved audit history) and run final validation bundle
  - id: ship
    persona: supervisor
    label: Stage the PR (no auto-push, Q3)
  - id: index
    persona: librarian
    label: Index emitted artifacts and refresh the feature index before librarian artifact closure
    outputs:
      - lib/memory/features/<feature-id>/index.json
      - .pan/work/<day>/<task-id>/pipeline-close.md
      - .pan/work/<day>/<task-id>/operator-verification.md
