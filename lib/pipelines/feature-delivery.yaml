id: feature-delivery
version: "1"
metadata:
  pancreator-bootstrap-only: false
  description: >-
    PRD §11 MVP pipeline. Walks a semi-formal directive in lib/inbox/in/ through
    product, design, and technical planning; implementation; review; QA;
    delivery report; compliance; ship; and index. Mirrors PRD §3.5 US-1. Each
    stage is owned by a named persona; plan-stage companion prompts collect
    product and design implementation plans plus acceptance criteria before the
    tech-lead emits the consolidated execution bundle. Runtime invocation and
    advancement regenerate a bounded next-prompt.md so stage delegation does not
    rely on prior chat context.
  references:
    - kind: lines
      path: .docs/PRD.md
      range: [1, 80]
      contentHash: 2eb6aa4
      note: Cited for product context; pipeline structure derives from PRD §11.
    - kind: lines
      path: .docs/BOOTSTRAP.md
      range: [223, 243]
      contentHash: b788753
      note: BOOTSTRAP Phase 4 names this pipeline as the US-1 dogfood entry point.
stages:
  - id: plan
    persona: tech-lead
    label: Consolidate product, design, and technical plans, acceptance criteria, manual QA cases, ADR, touch-set, and handoff
    inputs:
      - lib/inbox/in/<day>/<directive>.md
      - .pan/work/<day>/<task-id>/product-plan-prompt.md
      - .pan/work/<day>/<task-id>/design-plan-prompt.md
    outputs:
      - .pan/work/<day>/<task-id>/product-plan.md
      - .pan/work/<day>/<task-id>/product-acceptance-criteria.md
      - .pan/work/<day>/<task-id>/design-plan.md
      - .pan/work/<day>/<task-id>/design-acceptance-criteria.md
      - lib/memory/features/<feature-id>/ux-spec.md
      - .pan/work/<day>/<task-id>/tech-plan.md
      - .pan/work/<day>/<task-id>/tech-acceptance-criteria.md
      - .pan/work/<day>/<task-id>/manual-qa-test-cases.md
      - .pan/work/<day>/<task-id>/plan.md
      - .pan/work/<day>/<task-id>/adr-draft.md
      - .pan/work/<day>/<task-id>/touch-set.json
      - .pan/work/<day>/<task-id>/handoff.md
      - .pan/work/<day>/<task-id>/next-prompt.md
      - .pan/work/<day>/<task-id>/product-plan-prompt.md
      - .pan/work/<day>/<task-id>/design-plan-prompt.md
  - id: implement
    persona: coder
    label: Implement the planned touch-set and emit implementation-report gate proof
    outputs:
      - .pan/work/<day>/<task-id>/implementation-report.md
    inputs:
      - .pan/work/<day>/<task-id>/next-prompt.md
      - .pan/work/<day>/<task-id>/handoff.md
      - .pan/work/<day>/<task-id>/touch-set.json
      - .pan/work/<day>/<task-id>/product-plan.md
      - .pan/work/<day>/<task-id>/design-plan.md
      - .pan/work/<day>/<task-id>/tech-plan.md
      - .pan/work/<day>/<task-id>/manual-qa-test-cases.md
  - id: review
    persona: reviewer
    label: Verify ALL product, design, and technical acceptance criteria before QA
    outputs:
      - .pan/work/<day>/<task-id>/review.md
  - id: test
    persona: qa-tester
    label: Exercise manual QA test cases in parallel with design QA; emit test-report.md
    inputs:
      - .pan/work/<day>/<task-id>/review.md
      - .pan/work/<day>/<task-id>/touch-set.json
      - .pan/work/<day>/<task-id>/manual-qa-test-cases.md
      - lib/memory/features/<feature-id>/ux-spec.md
    outputs:
      - .pan/work/<day>/<task-id>/test-report.md
      - .pan/work/<day>/<task-id>/design-qa-report.md
      - .pan/work/<day>/<task-id>/design-qa-prompt.md
  - id: report
    persona: tech-writer
    label: Author the delivery report
  - id: compliance
    persona: compliance-auditor
    label: Audit baseline-delta compliance (saved audit history) and run final validation bundle
  - id: ship
    persona: supervisor
    label: Stage the PR (no auto-push, Q3)
  - id: index
    persona: librarian
    label: Index emitted artifacts and refresh the feature index before librarian artifact closure
    outputs:
      - lib/memory/features/<feature-id>/index.json
      - .pan/work/<day>/<task-id>/pipeline-close.md
      - .pan/work/<day>/<task-id>/operator-verification.md
