id: cockpit-design-audit-delivery
version: "1"
supervisor: supervisor
metadata:
  pancreator-bootstrap-only: false
  description: >-
    Operator-triggered design hardening loop for the operator cockpit (client/).
    The design-reviewer audits the running cockpit UX, style, and layout via the
    cursor-ide-browser MCP server; the intake-analyst canonicalizes the audit
    findings into one lib/inbox/in/ directive; the supervisor then runs
    feature-delivery on that directive in fully automated SDK mode. Optional
    arguments bind to the audit stage so the operator can target a specific
    cockpit surface and dev-server URL.
  args:
    - id: base-url
      label: Cockpit dev-server base URL the design-reviewer audits
      default: http://localhost:3000
    - id: route
      label: Cockpit route path to audit first
      default: /
  references:
    - kind: lines
      path: .docs/PRD.md
      range: [1, 80]
      contentHash: 2eb6aa4
      note: Cited for product context; pipeline structure derives from PRD §11.
    - kind: lines
      path: .docs/PRD.md
      range: [134, 142]
      contentHash: 2eb6aa4
      note: >-
        PRD §3.5 US-3 — UX spec contracts gate downstream verification; the
        design-reviewer inspects the running DOM against design assertions.
stages:
  - id: audit
    persona: design-reviewer
    label: Audit the running cockpit UX, style, and layout via the cursor-ide-browser MCP server
    inputs:
      - client/
      - "arg:base-url"
      - "arg:route"
    outputs:
      - .pan/work/<day>/<task-id>/cockpit-design-audit.md
  - id: intake
    persona: intake-analyst
    label: Canonicalize the design-audit findings into one lib/inbox/in/ directive
    inputs:
      - .pan/work/<day>/<task-id>/cockpit-design-audit.md
    outputs:
      - lib/inbox/in/<day-bucket>/<SID>_<HHMM>_<slug>.md
  - id: deliver
    persona: supervisor
    label: Run feature-delivery on the drafted directive in fully automated SDK mode
    inputs:
      - lib/inbox/in/<day-bucket>/<SID>_<HHMM>_<slug>.md
