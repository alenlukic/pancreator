id: cockpit-design-audit-validation
version: "1"
supervisor: supervisor
metadata:
  pancreator-bootstrap-only: false
  description: >-
    Enforcement-validation variant of cockpit-design-audit-delivery. Runs audit
    and intake only — no feature-delivery deliver leg — so design-craft gate
    findings can be verified and inbox directives drafted without the SDK
    implement stage mutating client/. Use this pipeline when validating
    design-reviewer enforcement, gate-blocking conditions, and intake scoping.
    For full craft delivery (plan through test with design personas), use
    lib/pipelines/cockpit-design-audit-delivery.yaml instead.
  args:
    - id: base-url
      label: Cockpit dev-server base URL the design-reviewer audits
      default: http://localhost:3000
    - id: route
      label: Cockpit route path to audit first
      default: /
  references:
    - kind: lines
      path: lib/memory/handbook/engineering/design-craft.md
      range: [196, 252]
      note: Gate-blocking conditions 1–12 the audit stage scans.
stages:
  - id: audit
    persona: design-reviewer
    label: Audit the running cockpit UX against design-craft gate-blocking conditions 1–12 and the holistic craft bar
    inputs:
      - client/
      - lib/memory/handbook/engineering/design-craft.md
      - "arg:base-url"
      - "arg:route"
    outputs:
      - .pan/work/<day>/<task-id>/cockpit-design-audit.md
  - id: intake
    persona: intake-analyst
    label: Canonicalize audit findings into one lib/inbox/in/ directive with design_steps enabled; do not start feature-delivery
    inputs:
      - .pan/work/<day>/<task-id>/cockpit-design-audit.md
    outputs:
      - lib/inbox/in/<day-bucket>/<SID>_<HHMM>_<slug>.md
