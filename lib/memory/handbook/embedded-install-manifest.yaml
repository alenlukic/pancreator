allow:
  - AGENTS.md
  - OPERATION.md
  - pancreator.yaml
  - pancreator-model-escalation.yaml
  - lib/personas/
  - lib/personas/skills/
  - lib/pipelines/
  - lib/memory/handbook/
  - lib/memory/active/
