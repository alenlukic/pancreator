schema_ref: "tests/compliance/schemas/latest.yaml"
id: "model-escalation-config"
severity: "high"
trigger_modes:
  - operator-on-demand
  - structure-change
scope:
  surface: "model-escalation-config"
  artifacts:
    - "pancreator-model-escalation.yaml"
    - "tests/compliance/schemas/model-escalation-config.schema.json"
    - "tests/compliance/model-escalation-config.yaml"
    - "tests/model-escalation-config.test.mjs"
assertion:
  statement: >
    The repository root escalation config SHALL validate against
    tests/compliance/schemas/model-escalation-config.schema.json and include coder and
    reviewer persona entries under the default config.
  pass_criteria: >
    node --test tests/model-escalation-config.test.mjs exits zero and the canonical
    pancreator-model-escalation.yaml file matches the schema.
