services:
  phoenix:
    image: arizephoenix/phoenix:version-7.1.1
    ports:
      - "6006:6006"
      - "4317:4317"
    environment:
      PHOENIX_WORKING_DIR: /tmp/phoenix
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:6006/health')",
        ]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 30s
