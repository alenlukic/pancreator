# Model escalation — config "default"
#
# Tier resolution (stageInvocationIndex N): greatest numeric tier key <= N; else `default`.
#
# Ladder rules (Cursor API pricing + LiveBench capability):
#   - default: auto (index 0; Auto + Composer pool)
#   - 1: persona baseline from lib/personas/<slug>.md
#   - Higher tiers MUST NOT downgrade to a weaker, pricier model, nor upgrade to a
#     stronger, cheaper model (that model belongs in tier 1 or persona frontmatter).
#   - When no valid model step exists, escalate via bracket qualifiers on the same
#     family (effort=, reasoning=) per https://cursor.com/docs/models-and-pricing
#   - Sparse tier keys are intentional: loopbacks 2–4 may reuse the prior tier.
#
# Pricing reference: https://cursor.com/docs/models-and-pricing (API output $/1M
# as primary cost axis). Capability tie-break: LiveBench-2026-01-08.

active_config: default

configs:
  default:
    personas:
      # --- feature-delivery pipeline ---

      intake-analyst:
        default: claude-sonnet-4-6[thinking=true,context=200k,effort=high]
        3: claude-sonnet-4-6[thinking=true,context=200k,effort=xhigh,fast=false]
        5: claude-opus-4-8[thinking=true,context=200k,effort=high,fast=false]

      tech-lead:
        default: auto
        1: gpt-5.4[context=272k,reasoning=extra-high,fast=false]
        4: claude-opus-4-8[thinking=true,context=200k,effort=xhigh,fast=false]
        5: gpt-5.5[context=272k,reasoning=extra-high,fast=false]

      coder:
        default: composer-2.5[fast=false]
        2: gpt-5.3-codex[reasoning=high,fast=false]
        4: gpt-5.3-codex[reasoning=extra-high,fast=false]

      reviewer:
        default: auto
        1: gpt-5.4[context=272k,reasoning=extra-high,fast=false]
        3: gpt-5.5[context=272k,reasoning=high,fast=false]
        5: gpt-5.5[context=272k,reasoning=extra-high,fast=false]

      qa-tester:
